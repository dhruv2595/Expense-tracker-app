

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Expenses</title>
<meta name="theme-color" content="#050506">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Expenses">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #020203;
    --bg-base: #050506;
    --bg-elevated: #0a0a0c;
    --surface: rgba(255,255,255,0.05);
    --surface-hover: rgba(255,255,255,0.08);
    --fg: #EDEDEF;
    --fg-muted: #8A8F98;
    --fg-subtle: rgba(255,255,255,0.40);
    --accent: #5E6AD2;
    --accent-bright: #6872D9;
    --accent-glow: rgba(94,106,210,0.3);
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.10);
    --border-accent: rgba(94,106,210,0.30);
    --ease-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --green: #34D399;
    --green-glow: rgba(52,211,153,0.25);
    --orange: #FB923C;
    --orange-glow: rgba(251,146,60,0.2);
    --blue: #60A5FA;
    --blue-glow: rgba(96,165,250,0.2);
    --purple: #A78BFA;
    --purple-glow: rgba(167,139,250,0.2);
    --slate: #F472B6;
    --slate-glow: rgba(244,114,182,0.2);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-base);
    color: var(--fg);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- Ambient Background ---- */
  .ambient {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .ambient::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at top center, #0a0a0f 0%, #050506 50%, #020203 100%);
  }
  .blob {
    position: absolute; border-radius: 50%; filter: blur(120px); will-change: transform;
  }
  .blob-1 {
    width: 500px; height: 700px; top: -200px; left: 50%; transform: translateX(-50%);
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    animation: float1 10s ease-in-out infinite;
  }
  .blob-2 {
    width: 300px; height: 400px; top: 40%; right: -100px;
    background: radial-gradient(circle, rgba(167,139,250,0.12) 0%, transparent 70%);
    animation: float2 8s ease-in-out infinite;
  }
  .blob-3 {
    width: 350px; height: 350px; bottom: -50px; left: -80px;
    background: radial-gradient(circle, rgba(96,165,250,0.08) 0%, transparent 70%);
    animation: float3 9s ease-in-out infinite;
  }
  .noise {
    position: absolute; inset: 0; opacity: 0.018;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px;
  }

  @keyframes float1 { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-15px) rotate(0.5deg)} }
  @keyframes float2 { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-20px) rotate(1deg)} }
  @keyframes float3 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(12px) rotate(-0.5deg)} }

  /* ---- Container ---- */
  .app {
    position: relative; z-index: 1;
    max-width: 420px; margin: 0 auto;
    padding: 20px 16px 120px;
    min-height: 100vh; min-height: 100dvh;
  }

  /* ---- Header ---- */
  .header {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 12px 0 20px;
  }
  .header h1 {
    font-size: 28px; font-weight: 700; letter-spacing: -0.03em;
    background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.7) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .month-row {
    display: flex; align-items: center; gap: 8px; margin-top: 4px;
  }
  .month-label {
    font-size: 13px; color: var(--fg-muted); font-weight: 400;
  }
  .month-total {
    font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500;
    color: var(--fg); letter-spacing: -0.02em;
  }
  .settings-btn {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s var(--ease-expo);
    color: var(--fg-muted);
  }
  .settings-btn:hover { background: var(--surface-hover); border-color: var(--border-hover); }
  .settings-btn:active { transform: scale(0.96); }
  .settings-btn svg { width: 18px; height: 18px; }

  /* ---- Settings ---- */
  .settings {
    max-height: 0; overflow: hidden; opacity: 0;
    transition: max-height 0.4s var(--ease-expo), opacity 0.3s var(--ease-expo), margin 0.4s var(--ease-expo);
    margin-bottom: 0;
  }
  .settings.open { max-height: 220px; opacity: 1; margin-bottom: 16px; }
  .settings-inner {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 16px;
    box-shadow: 0 0 0 1px var(--border), 0 4px 24px rgba(0,0,0,0.4);
  }
  .settings-inner label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--fg-muted); display: block; margin-bottom: 8px;
  }
  .url-row { display: flex; gap: 8px; }
  .url-input {
    flex: 1; padding: 10px 12px; border-radius: 8px;
    background: var(--bg-base); border: 1px solid var(--border);
    font-size: 12px; font-family: 'JetBrains Mono', monospace;
    color: var(--fg); outline: none; transition: border-color 0.2s;
    min-width: 0;
  }
  .url-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .url-input::placeholder { color: var(--fg-subtle); }
  .connect-btn {
    padding: 10px 16px; border-radius: 8px; border: none;
    background: var(--accent); color: #fff; font-size: 12px; font-weight: 600;
    font-family: 'Inter', sans-serif; cursor: pointer; white-space: nowrap;
    box-shadow: 0 0 0 1px rgba(94,106,210,0.5), 0 4px 12px rgba(94,106,210,0.3), inset 0 1px 0 0 rgba(255,255,255,0.15);
    transition: all 0.15s var(--ease-expo);
  }
  .connect-btn:hover { background: var(--accent-bright); }
  .connect-btn:active { transform: scale(0.96); }
  .connected-dot {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--green); font-weight: 500; margin-top: 10px;
  }
  .connected-dot::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 8px var(--green-glow);
  }

  /* ---- Form Card ---- */
  .card {
    background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
    border: 1px solid var(--border); border-radius: 20px; padding: 20px;
    box-shadow: 0 0 0 1px var(--border), 0 4px 30px rgba(0,0,0,0.3), 0 0 60px rgba(0,0,0,0.15);
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
  }

  .form-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--fg-muted);
    display: block; margin-bottom: 10px; margin-top: 20px;
  }
  .form-label:first-child { margin-top: 0; }

  /* ---- Category Chips ---- */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: flex; align-items: center; gap: 7px;
    padding: 9px 14px; border-radius: 10px;
    font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--surface); color: var(--fg-muted);
    transition: all 0.2s var(--ease-expo);
    -webkit-user-select: none; user-select: none;
  }
  .chip svg { width: 16px; height: 16px; flex-shrink: 0; }
  .chip:active { transform: scale(0.96); }
  .chip.active {
    color: #fff; border-color: transparent;
    transform: scale(1.02);
  }
  .chip[data-cat="Grocery"].active {
    background: rgba(52,211,153,0.15); border-color: rgba(52,211,153,0.3); color: var(--green);
  }
  .chip[data-cat="Dining Out"].active {
    background: rgba(251,146,60,0.15); border-color: rgba(251,146,60,0.3); color: var(--orange);
  }
  .chip[data-cat="Transportation"].active {
    background: rgba(96,165,250,0.15); border-color: rgba(96,165,250,0.3); color: var(--blue);
  }
  .chip[data-cat="Subscriptions"].active {
    background: rgba(167,139,250,0.15); border-color: rgba(167,139,250,0.3); color: var(--purple);
  }
  .chip[data-cat="Misc"].active {
    background: rgba(244,114,182,0.15); border-color: rgba(244,114,182,0.3); color: var(--slate);
  }

  /* ---- Amount (Wise-style dynamic) ---- */
  .amount-wrap {
    display: flex; align-items: center;
    background: var(--bg-base); border: 1px solid var(--border);
    border-radius: 12px; padding: 4px 16px;
    transition: border-color 0.3s var(--ease-expo), box-shadow 0.3s var(--ease-expo), padding 0.35s var(--ease-expo);
  }
  .amount-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
    padding: 10px 16px;
  }
  .dollar {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px; font-weight: 500; color: var(--fg-subtle); margin-right: 4px;
    transition: font-size 0.35s var(--ease-expo), color 0.3s var(--ease-expo);
  }
  .amount-wrap:focus-within .dollar {
    font-size: 36px; color: var(--fg-muted);
  }
  .amount-wrap.has-value .dollar {
    font-size: 36px; color: var(--fg-muted);
  }
  .amount-input {
    flex: 1; border: none; background: transparent;
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px; font-weight: 600; padding: 8px 0;
    outline: none; color: var(--fg); width: 100%;
    letter-spacing: -0.02em;
    transition: font-size 0.35s var(--ease-expo);
  }
  .amount-wrap:focus-within .amount-input {
    font-size: 40px;
  }
  .amount-wrap.has-value .amount-input {
    font-size: 40px;
  }
  .amount-wrap.has-value {
    padding: 10px 16px;
  }
  .amount-input::placeholder { color: var(--fg-subtle); opacity: 0.4; }
  /* Remove number spinners */
  .amount-input::-webkit-inner-spin-button,
  .amount-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .amount-input { -moz-appearance: textfield; }

  /* ---- Inputs ---- */
  .form-input {
    width: 100%; max-width: 100%; padding: 12px 14px; border-radius: 10px;
    background: var(--bg-base); border: 1px solid var(--border);
    font-size: 14px; font-family: 'Inter', sans-serif;
    color: var(--fg); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    color-scheme: dark;
  }
  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .form-input::placeholder { color: var(--fg-subtle); }

  /* ---- Date Picker (custom) ---- */
  .date-wrap {
    position: relative; display: flex; align-items: center;
    background: var(--bg-base); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; cursor: pointer;
    transition: border-color 0.2s var(--ease-expo), box-shadow 0.2s var(--ease-expo);
  }
  .date-wrap:active { transform: scale(0.99); }
  .date-hidden {
    position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%;
    cursor: pointer; z-index: 2; -webkit-appearance: none;
  }
  .date-display {
    flex: 1; font-size: 14px; font-family: 'Inter', sans-serif;
    color: var(--fg); font-weight: 500; pointer-events: none;
  }
  .date-icon {
    width: 16px; height: 16px; color: var(--fg-muted); pointer-events: none; flex-shrink: 0;
  }

  /* ---- Save Button ---- */
  .save-btn {
    margin-top: 24px; width: 100%; padding: 15px;
    border: none; border-radius: 12px;
    font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
    font-family: 'Inter', sans-serif; cursor: pointer;
    color: #fff; background: var(--accent);
    box-shadow: 0 0 0 1px rgba(94,106,210,0.5), 0 4px 16px rgba(94,106,210,0.35),
                inset 0 1px 0 0 rgba(255,255,255,0.15);
    transition: transform 0.2s var(--ease-expo), box-shadow 0.2s, background 0.15s;
    position: relative; overflow: hidden;
  }
  .save-btn::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 50%);
    pointer-events: none;
  }
  .save-btn:hover {
    background: var(--accent-bright);
    box-shadow: 0 0 0 1px rgba(94,106,210,0.6), 0 8px 30px rgba(94,106,210,0.4),
                inset 0 1px 0 0 rgba(255,255,255,0.2);
  }
  .save-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
  .save-btn .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.6s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- Success Overlay ---- */
  .success-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: rgba(2,2,3,0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s var(--ease-expo);
  }
  .success-overlay.show { opacity: 1; pointer-events: auto; }
  .success-check {
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(52,211,153,0.1); border: 1.5px solid rgba(52,211,153,0.25);
    display: flex; align-items: center; justify-content: center;
    transform: scale(0);
    box-shadow: 0 0 60px var(--green-glow);
  }
  .success-overlay.show .success-check {
    animation: successSnap 0.5s var(--ease-expo) forwards;
  }
  @keyframes successSnap {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .success-check svg { width: 30px; height: 30px; color: var(--green); }
  .success-text {
    margin-top: 16px; font-size: 14px; font-weight: 500;
    color: var(--fg-muted); text-align: center;
    opacity: 0; transform: translateY(10px);
    transition: all 0.3s var(--ease-expo) 0.15s;
  }
  .success-overlay.show .success-text { opacity: 1; transform: translateY(0); }
  .success-inner { display: flex; flex-direction: column; align-items: center; }

  /* ---- Recent ---- */
  .recent { margin-top: 28px; }
  .recent-header {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--fg-muted);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .recent-header::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
  }

  .entry {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 14px;
    background: var(--surface); border: 1px solid var(--border);
    margin-bottom: 6px;
    opacity: 0; transform: translateY(15px);
    transition: opacity 0.4s var(--ease-expo), transform 0.4s var(--ease-expo), background 0.2s;
  }
  .entry.visible { opacity: 1; transform: translateY(0); }
  .entry:hover { background: var(--surface-hover); }

  .entry-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .entry-icon svg { width: 16px; height: 16px; }

  .entry-details { flex: 1; min-width: 0; }
  .entry-cat { font-size: 13px; font-weight: 600; color: var(--fg); display: block; }
  .entry-meta {
    font-size: 11px; color: var(--fg-subtle);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .entry-amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 600; flex-shrink: 0;
  }

  /* ---- Stacked Card Group ---- */
  .entry-group {
    position: relative;
    margin-bottom: 18px;
    padding-bottom: 10px;
    opacity: 0; transform: translateY(15px);
    transition: opacity 0.4s var(--ease-expo), transform 0.4s var(--ease-expo);
  }
  .entry-group.expanded { padding-bottom: 0; margin-bottom: 6px; }
  .entry-group.visible { opacity: 1; transform: translateY(0); }

  /* Stacked cards peeking below the front card, narrowing inward */
  .stack-layer {
    position: absolute;
    border-radius: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    pointer-events: none;
    height: 12px;
    transition: all 0.4s var(--ease-expo);
  }
  .stack-layer-1 {
    bottom: 4px;
    left: 6px; right: 6px;
    opacity: 0.4;
    z-index: -1;
  }
  .stack-layer-2 {
    bottom: 0px;
    left: 12px; right: 12px;
    opacity: 0.18;
    z-index: -2;
  }

  /* Hide stack layers when expanded */
  .entry-group.expanded .stack-layer {
    opacity: 0;
    bottom: 12px;
  }

  /* Front card of a group (summary) */
  .entry-group-front {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 14px;
    background: var(--surface); border: 1px solid var(--border);
    cursor: pointer; position: relative; z-index: 1;
    transition: background 0.2s var(--ease-expo), border-color 0.2s var(--ease-expo), transform 0.15s var(--ease-expo);
    -webkit-user-select: none; user-select: none;
  }
  .entry-group-front:hover { background: var(--surface-hover); }
  .entry-group-front:active { transform: scale(0.98); }

  .entry-group.expanded .entry-group-front {
    border-color: var(--border-hover);
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
    border-bottom-color: transparent;
  }

  .group-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500;
    color: var(--fg-subtle);
    margin-left: 2px;
  }

  .group-chevron {
    width: 14px; height: 14px; flex-shrink: 0;
    color: var(--fg-subtle);
    transition: transform 0.35s var(--ease-expo);
    margin-left: 4px;
  }
  .entry-group.expanded .group-chevron {
    transform: rotate(180deg);
  }

  /* Accordion body */
  .group-accordion {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s var(--ease-expo);
    position: relative; z-index: 1;
  }
  .group-accordion-inner {
    background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.015) 100%);
    border: 1px solid var(--border-hover);
    border-top: none;
    border-bottom-left-radius: 14px;
    border-bottom-right-radius: 14px;
    padding: 2px 0;
  }

  /* Individual items inside the accordion */
  .group-child {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.3s var(--ease-expo), transform 0.3s var(--ease-expo);
    position: relative;
  }
  .group-child.visible { opacity: 1; transform: translateY(0); }
  .group-child + .group-child::before {
    content: '';
    position: absolute; top: 0; left: 48px; right: 14px;
    height: 1px;
    background: var(--border);
  }
  .group-child-details { flex: 1; min-width: 0; }
  .group-child-date {
    font-size: 12px; font-weight: 500; color: var(--fg);
  }
  .group-child-notes {
    font-size: 11px; color: var(--fg-subtle);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .group-child-amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 600; flex-shrink: 0;
  }
  .group-child-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    margin-left: 4px;
  }

  /* ---- Toast ---- */
  .toast {
    position: fixed; bottom: 32px; left: 50%; z-index: 200;
    transform: translateX(-50%) translateY(80px);
    padding: 10px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 500; color: var(--fg);
    background: var(--bg-elevated); border: 1px solid var(--border);
    box-shadow: 0 0 0 1px var(--border), 0 8px 40px rgba(0,0,0,0.5);
    transition: transform 0.35s var(--ease-expo), opacity 0.35s;
    opacity: 0; pointer-events: none; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.error { border-color: rgba(239,68,68,0.3); }
</style>
</head>
<body>

<!-- Ambient Background -->
<div class="ambient">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="noise"></div>
</div>

<!-- Success Overlay -->
<div class="success-overlay" id="successOverlay">
  <div class="success-inner">
    <div class="success-check">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><polyline points="4 12 10 18 20 6"/></svg>
    </div>
    <div class="success-text" id="successText">Saved</div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- App -->
<div class="app">

  <!-- Header -->
  <div class="header">
    <div>
      <h1>Expenses</h1>
      <div class="month-row">
        <span class="month-label">This month</span>
        <span class="month-total" id="monthTotal">$0.00</span>
      </div>
    </div>
    <button class="settings-btn" id="settingsToggle" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
      </svg>
    </button>
  </div>

  <!-- Settings -->
  <div class="settings" id="settingsPanel">
    <div class="settings-inner">
      <label>Script URL</label>
      <div class="url-row">
        <input class="url-input" id="scriptUrlInput" placeholder="https://script.google.com/..." />
        <button class="connect-btn" id="connectBtn">Link</button>
      </div>
      <div class="connected-dot" id="connectedBadge" style="display:none;">Connected</div>
    </div>
  </div>

  <!-- Form -->
  <div class="card">
    <span class="form-label">Category</span>
    <div class="chips" id="chips"></div>

    <span class="form-label">Amount</span>
    <div class="amount-wrap">
      <span class="dollar">$</span>
      <input type="number" inputmode="decimal" step="0.01" min="0" placeholder="0.00" class="amount-input" id="amountInput">
    </div>

    <span class="form-label">Date</span>
    <div class="date-wrap" id="dateWrap">
      <input type="date" class="date-hidden" id="dateInput">
      <span class="date-display" id="dateDisplay"></span>
      <svg class="date-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </div>

    <span class="form-label">Notes</span>
    <input type="text" class="form-input" id="notesInput" placeholder="Optional note...">

    <button class="save-btn" id="saveBtn">Save Expense</button>
  </div>

  <!-- Recent -->
  <div class="recent" id="recentSection" style="display:none;">
    <div class="recent-header">Recent</div>
    <div id="entriesList"></div>
  </div>

</div>

<script>
// ---- SVG Icons: 1.5px stroke, square caps, zero gradients ----
const ICONS = {
  "Grocery": '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>',
  "Dining Out": '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8Z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>',
  "Transportation": '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><rect x="1" y="3" width="15" height="13" rx="2"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>',
  "Subscriptions": '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>',
  "Misc": '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>'
};

const CATS = [
  { id: "Grocery", color: "var(--green)", bg: "rgba(52,211,153,0.08)" },
  { id: "Dining Out", color: "var(--orange)", bg: "rgba(251,146,60,0.08)" },
  { id: "Transportation", color: "var(--blue)", bg: "rgba(96,165,250,0.08)" },
  { id: "Subscriptions", color: "var(--purple)", bg: "rgba(167,139,250,0.08)" },
  { id: "Misc", color: "var(--slate)", bg: "rgba(244,114,182,0.08)" }
];

let selected = "";
let scriptUrl = "";
let entries = [];
let saving = false;

// ---- Init ----
function init() {
  scriptUrl = localStorage.getItem("exp_url") || "";
  entries = JSON.parse(localStorage.getItem("exp_entries") || "[]");
  document.getElementById("scriptUrlInput").value = scriptUrl;
  if (scriptUrl) document.getElementById("connectedBadge").style.display = "inline-flex";
  else document.getElementById("settingsPanel").classList.add("open");
  document.getElementById("dateInput").value = todayStr();
  updateDateDisplay();
  renderChips();
  renderEntries();
  updateTotal();
}

function updateDateDisplay() {
  const val = document.getElementById("dateInput").value;
  if (!val) return;
  const p = val.split("-");
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById("dateDisplay").textContent = parseInt(p[2]) + ' ' + months[parseInt(p[1])-1] + ', ' + p[0];
}
document.getElementById("dateInput").addEventListener("change", updateDateDisplay);

function todayStr() {
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function fmtDate(s) {
  const p = s.split("-");
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return p[2] + ' ' + months[parseInt(p[1])-1] + ', ' + p[0];
}

// ---- Chips ----
function renderChips() {
  const el = document.getElementById("chips");
  el.innerHTML = "";
  CATS.forEach((cat, i) => {
    const btn = document.createElement("button");
    btn.className = "chip" + (selected === cat.id ? " active" : "");
    btn.setAttribute("data-cat", cat.id);
    btn.innerHTML = ICONS[cat.id] + "<span>" + cat.id + "</span>";
    btn.onclick = () => { selected = cat.id; renderChips(); };
    el.appendChild(btn);
  });
}

// ---- Settings ----
document.getElementById("settingsToggle").onclick = () =>
  document.getElementById("settingsPanel").classList.toggle("open");

document.getElementById("connectBtn").onclick = () => {
  const url = document.getElementById("scriptUrlInput").value.trim();
  if (!url) return;
  scriptUrl = url;
  localStorage.setItem("exp_url", url);
  document.getElementById("connectedBadge").style.display = "inline-flex";
  document.getElementById("settingsPanel").classList.remove("open");
  showToast("Linked to spreadsheet");
};

// ---- Amount dynamic scaling ----
const amountInput = document.getElementById("amountInput");
const amountWrap = amountInput.closest(".amount-wrap");
function updateAmountState() {
  if (amountInput.value && parseFloat(amountInput.value) > 0) {
    amountWrap.classList.add("has-value");
  } else {
    amountWrap.classList.remove("has-value");
  }
}
amountInput.addEventListener("input", updateAmountState);
amountInput.addEventListener("blur", updateAmountState);

// ---- Save (Wise "weighty" button) ----
const saveBtn = document.getElementById("saveBtn");

saveBtn.addEventListener("pointerdown", function(e) {
  if (this.disabled) return;
  this.style.transition = "transform 0.1s ease";
  this.style.transform = "scale(0.96)";
});

saveBtn.addEventListener("pointerup", function(e) {
  if (this.disabled) return;
  this.style.transition = "transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)";
  this.style.transform = "scale(1.03)";
  setTimeout(() => { this.style.transform = "scale(1)"; }, 180);
});

saveBtn.addEventListener("pointerleave", function(e) {
  this.style.transition = "transform 0.2s cubic-bezier(0.16, 1, 0.3, 1)";
  this.style.transform = "scale(1)";
});

saveBtn.onclick = async () => {
  if (saving) return;
  if (!selected) return showToast("Pick a category", true);
  const amt = document.getElementById("amountInput").value;
  if (!amt || isNaN(parseFloat(amt)) || parseFloat(amt) <= 0) return showToast("Enter an amount", true);
  if (!scriptUrl) return showToast("Link your script URL first", true);

  saving = true;
  saveBtn.disabled = true;
  saveBtn.innerHTML = '<span class="spinner"></span>Saving...';

  const expense = {
    date: fmtDate(document.getElementById("dateInput").value),
    category: selected,
    amount: parseFloat(amt).toFixed(2),
    notes: document.getElementById("notesInput").value.trim()
  };

  try {
    await fetch(scriptUrl, {
      method: "POST", mode: "no-cors",
      headers: {"Content-Type":"text/plain"},
      body: JSON.stringify(expense)
    });

    entries.unshift({...expense, timestamp: Date.now()});
    entries = entries.slice(0, 50);
    localStorage.setItem("exp_entries", JSON.stringify(entries));

    // Success snap overlay
    showSuccess(expense.category + " — $" + expense.amount);

    // Reset
    selected = "";
    document.getElementById("amountInput").value = "";
    document.getElementById("notesInput").value = "";
    document.getElementById("dateInput").value = todayStr();
    updateDateDisplay();
    renderChips();
    renderEntries();
    updateTotal();
  } catch(e) {
    showToast("Connection failed", true);
  } finally {
    saving = false;
    saveBtn.disabled = false;
    saveBtn.textContent = "Save Expense";
  }
};

// ---- Success Overlay ----
function showSuccess(text) {
  const overlay = document.getElementById("successOverlay");
  document.getElementById("successText").textContent = text;
  overlay.classList.add("show");
  setTimeout(() => overlay.classList.remove("show"), 1500);
}

// ---- Toast ----
function showToast(msg, isError) {
  const t = document.getElementById("toast");
  t.textContent = (isError ? "⚠ " : "✓ ") + msg;
  t.className = "toast" + (isError ? " error" : "") + " show";
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ---- Entries (staggered entrance + grouped stacking) ----

// Chevron SVG for expand/collapse
const CHEVRON_SVG = '<svg class="group-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"><polyline points="6 9 12 15 18 9"/></svg>';

function groupEntries(list) {
  // Group by category, preserving insertion order of first appearance
  const groups = {};
  const order = [];
  list.forEach(entry => {
    const key = entry.category;
    if (!groups[key]) { groups[key] = []; order.push(key); }
    groups[key].push(entry);
  });
  // Build render list: groups with 3+ become stacked, rest stay individual
  const result = [];
  order.forEach(key => {
    const items = groups[key];
    if (items.length >= 3) {
      result.push({ type: 'group', category: key, items: items });
    } else {
      items.forEach(item => result.push({ type: 'single', entry: item }));
    }
  });
  return result;
}

function toggleGroup(groupEl) {
  const isExpanded = groupEl.classList.contains('expanded');
  const accordion = groupEl.querySelector('.group-accordion');
  const children = accordion.querySelectorAll('.group-child');

  if (isExpanded) {
    // Collapse: hide children first, then shrink
    children.forEach(c => c.classList.remove('visible'));
    accordion.style.maxHeight = '0px';
    groupEl.classList.remove('expanded');
  } else {
    // Expand: grow accordion, then stagger children in
    groupEl.classList.add('expanded');
    accordion.style.maxHeight = accordion.scrollHeight + 'px';
    children.forEach((c, i) => {
      c.classList.remove('visible');
      setTimeout(() => c.classList.add('visible'), 80 + i * 50);
    });
  }
}

function renderEntries() {
  const sec = document.getElementById("recentSection");
  const list = document.getElementById("entriesList");
  if (!entries.length) { sec.style.display = "none"; return; }
  sec.style.display = "block";
  list.innerHTML = "";

  const visible = entries.slice(0, 20);
  const grouped = groupEntries(visible);
  let staggerIndex = 0;

  grouped.forEach(item => {
    if (item.type === 'single') {
      // Render a normal individual entry card (unchanged from before)
      const entry = item.entry;
      const cat = CATS.find(c => c.id === entry.category) || CATS[4];
      const div = document.createElement("div");
      div.className = "entry";
      div.innerHTML =
        '<div class="entry-icon" style="background:'+cat.bg+';color:'+cat.color+'">' + (ICONS[entry.category]||ICONS["Misc"]) + '</div>' +
        '<div class="entry-details">' +
          '<span class="entry-cat">'+entry.category+'</span>' +
          '<span class="entry-meta">'+entry.date+(entry.notes?' · '+entry.notes:'')+'</span>' +
        '</div>' +
        '<span class="entry-amount" style="color:'+cat.color+'">$'+parseFloat(entry.amount).toFixed(2)+'</span>';
      list.appendChild(div);
      const idx = staggerIndex++;
      setTimeout(() => div.classList.add("visible"), 60 + idx * 50);

    } else {
      // Render a stacked group card
      const items = item.items;
      const cat = CATS.find(c => c.id === item.category) || CATS[4];
      const total = items.reduce((s, e) => s + parseFloat(e.amount), 0);
      const count = items.length;

      const groupEl = document.createElement("div");
      groupEl.className = "entry-group";

      // Stack layers (the subtle cards behind)
      const stackCount = Math.min(count - 1, 2);
      for (let s = stackCount; s >= 1; s--) {
        const layer = document.createElement("div");
        layer.className = "stack-layer stack-layer-" + s;
        groupEl.appendChild(layer);
      }

      // Front card
      const front = document.createElement("div");
      front.className = "entry-group-front";
      front.innerHTML =
        '<div class="entry-icon" style="background:'+cat.bg+';color:'+cat.color+'">' + (ICONS[item.category]||ICONS["Misc"]) + '</div>' +
        '<div class="entry-details">' +
          '<span class="entry-cat">'+item.category+'</span>' +
          '<span class="group-count">'+count+' expenses</span>' +
        '</div>' +
        '<span class="entry-amount" style="color:'+cat.color+'">$'+total.toFixed(2)+'</span>' +
        CHEVRON_SVG;
      front.addEventListener('click', () => toggleGroup(groupEl));
      groupEl.appendChild(front);

      // Accordion body with individual items
      const accordion = document.createElement("div");
      accordion.className = "group-accordion";
      const accordionInner = document.createElement("div");
      accordionInner.className = "group-accordion-inner";

      items.forEach(entry => {
        const child = document.createElement("div");
        child.className = "group-child";
        child.innerHTML =
          '<div class="group-child-dot" style="background:'+cat.color+';opacity:0.5;"></div>' +
          '<div class="group-child-details">' +
            '<span class="group-child-date">'+entry.date+'</span>' +
            (entry.notes ? '<span class="group-child-notes">'+entry.notes+'</span>' : '') +
          '</div>' +
          '<span class="group-child-amount" style="color:'+cat.color+'">$'+parseFloat(entry.amount).toFixed(2)+'</span>';
        accordionInner.appendChild(child);
      });

      accordion.appendChild(accordionInner);
      groupEl.appendChild(accordion);
      list.appendChild(groupEl);

      const idx = staggerIndex++;
      setTimeout(() => groupEl.classList.add("visible"), 60 + idx * 50);
    }
  });
}

// ---- Month Total ----
function updateTotal() {
  const now = new Date();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const total = entries
    .filter(e => {
      const parts = e.date.replace(',','').split(' ');
      const m = months.indexOf(parts[1]) + 1;
      const y = parseInt(parts[2]);
      return m === now.getMonth()+1 && y === now.getFullYear();
    })
    .reduce((s,e) => s + parseFloat(e.amount), 0);
  document.getElementById("monthTotal").textContent = "$" + total.toFixed(2);
}

init();

// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
